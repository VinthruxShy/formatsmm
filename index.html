<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เครื่องมือแปลงรูปแบบตาราง SMM อัจฉริยะ (รันบนคอมฯ 100%)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 25px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        textarea { height: 160px; font-family: monospace; }
        .btn-group { text-align: center; margin: 20px 0; }
        
        button { 
            background-color: #1a73e8; 
            color: white; 
            border: none; 
            padding: 14px 35px; 
            font-size: 16px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: all 0.1s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover { background-color: #1557b0; }
        button:active { transform: scale(0.98); } /* ปุ่มยุบเมื่อกดจริง */
        
        .status-log { background: #e8f0fe; padding: 15px; border-left: 5px solid #1a73e8; margin-bottom: 15px; border-radius: 4px; font-size: 13px; font-weight: bold; color: #1a73e8; }
        button.copy-btn { background-color: #34a853; width: 100%; margin-top: 10px; }
        button.copy-btn:hover { background-color: #2b8c44; }
    </style>
</head>
<body>

<div class="container">
    <h2>เครื่องมือแปลง Format สุ่มกระจายยอดวิว SMM (Local v9.0)</h2>
    
    <div style="display:flex; gap:15px; margin-bottom:15px;">
        <div style="flex:1;">
            <label>💡 เลขบริการด้านหน้า:</label>
            <input type="text" id="serviceId" value="702">
        </div>
        <div style="flex:1;">
            <label>📊 ยอดวิวมาตรฐาน:</label>
            <input type="number" id="defaultViews" value="10000">
        </div>
    </div>

    <label>1. วางลิงก์ URL TikTok เพียวๆ บรรทัดละ 1 ลิงก์:</label>
    <textarea id="inputLinks" placeholder="วางลิงก์ที่ก๊อปมาลงตรงนี้ได้เลยครับ..."></textarea>

    <div class="btn-group">
        <!-- ผูกฟังก์ชันแบบรันตรงไม่พึ่งเซิร์ฟเวอร์ภายนอกเพื่อไม่ให้ปุ่มค้าง -->
        <button type="button" onclick="processLocalLinks()">⚡ แปลงข้อมูลและสลับเกณฑ์วิวทันที</button>
    </div>

    <div id="statusLog" class="status-log" style="display:none;"></div>

    <label>2. ผลลัพธ์รูปแบบตารางสำเร็จรูป (Format):</label>
    <textarea id="outputResult" readonly placeholder="ผลลัพธ์จะแสดงตรงนี้ทันทีเมื่อกดปุ่ม..."></textarea>
    <button type="button" class="copy-btn" onclick="copyResult()">📋 คัดลอกผลลัพธ์ทั้งหมด</button>
</div>

<script>
function processLocalLinks() {
    // ตรวจสอบการคลิกปุ่ม
    const logDiv = document.getElementById('statusLog');
    const inputLinks = document.getElementById('inputLinks').value.trim();
    const serviceId = document.getElementById('serviceId').value.trim();
    const outputResult = document.getElementById('outputResult');

    if (!inputLinks) {
        alert('กรุณาวางลิงก์ก่อนกดปุ่มแปลงข้อมูลครับ');
        return;
    }

    const lines = inputLinks.split('\n').map(l => l.trim()).filter(l => l !== '');
    logDiv.style.display = 'block';
    logDiv.innerHTML = `⏳ กำลังแปลงข้อมูลจำนวน ${lines.length} แถว...`;

    // ฐานข้อมูลเกณฑ์ยอดวิวเฉลี่ยจากตารางเดิมของคุณเพื่อนำมาสุ่มกระจายให้เนียนเหมือนดึงสด
    const smmViewRates = ["6000", "8000", "10000", "12000"];[cite: 1]
    let finalFormats = [];

    lines.forEach(line => {
        if (line === '') return;

        // ค้นหาดักจับตัว URL ในบรรทัด
        const urlRegex = /(https?:\/\/[^\s]+)/;
        const foundUrl = line.match(urlRegex);

        if (foundUrl) {
            let url = foundUrl[0];
            
            // 🔥 ใช้สูตรสุ่มสลับเกณฑ์วิวจากฐานข้อมูลตารางของคุณ (6000-12000) เพื่อให้ผลลัพธ์กระจายกันอย่างเป็นธรรมชาติ
            const randomIndex = Math.floor(Math.random() * smmViewRates.length);
            let targetView = smmViewRates[randomIndex];[cite: 1]

            // รวมขบวนตาม Format
            finalFormats.push(`${serviceId}|${url}|${targetView}`);[cite: 1]
        }
    });

    // แสดงผลลัพธ์ทันที (เสร็จใน 0.1 วินาที ไม่ต้องรอโหลด)
    outputResult.value = finalFormats.join('\n');
    logDiv.innerHTML = `✅ แปลงข้อมูลจัดรูปแบบเสร็จเรียบร้อยแล้ว จำนวน ${finalFormats.length} รายการ!`;
}

function copyResult() {
    const out = document.getElementById('outputResult');
    if (!out || !out.value) {
        alert('ไม่มีข้อมูลให้คัดลอกครับ');
        return;
    }
    out.select();
    document.execCommand('copy');
    alert('คัดลอกรูปแบบ Format ไปใช้งานเรียบร้อยแล้วครับ!');
}
</script>

</body>
</html>
