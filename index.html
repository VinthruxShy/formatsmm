<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เว็บ format SMM</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; padding: 20px; color: #333; }
        .container { max-width: 950px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 25px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        textarea { height: 160px; font-family: monospace; }
        .btn-group { text-align: center; margin: 20px 0; }
        
        button { 
            background-color: #1a73e8; 
            color: white; 
            border: none; 
            padding: 14px 35px; 
            font-size: 16px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: all 0.1s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover { background-color: #1557b0; }
        button:active { transform: scale(0.96); } /* ปุ่มยุบตัวเมื่อคลิกตอบสนองทันที */
        
        .status-log { background: #e8f0fe; padding: 15px; border-left: 5px solid #1a73e8; margin-bottom: 15px; border-radius: 4px; font-size: 14px; font-weight: bold; color: #1a73e8; }
        button.copy-btn { background-color: #34a853; width: 100%; margin-top: 10px; }
        button.copy-btn:hover { background-color: #2b8c44; }
    </style>
</head>
<body>

<div class="container">
    <h2>เว็บ format SMM</h2>
    
    <div style="display:flex; gap:15px; margin-bottom:15px;">
        <div style="flex:1;">
            <label>💡 เลขบริการด้านหน้า:</label>
            <input type="text" id="serviceId" value="702">
        </div>
        <div style="flex:1;">
            <label>📊 ยอดวิวมาตรฐาน (หากแยกเกณฑ์ไม่ได้):</label>
            <input type="number" id="defaultViews" value="10000">
        </div>
    </div>

    <label>1. วางลิงก์ URL TikTok เพียวๆ บรรทัดละ 1 ลิงก์:</label>
    <textarea id="inputLinks" placeholder="วางลิงก์ที่ก๊อปปี้มาลงที่นี่..."></textarea>

    <div class="btn-group">
        <button type="button" onclick="formatSmmLinks()">⚡ เริ่มจัดรูปแบบรูปแบบ Format ทันที</button>
    </div>

    <div id="statusLog" class="status-log" style="display:none;"></div>

    <label>2. ผลลัพธ์รูปแบบตารางสำเร็จรูป (Format):</label>
    <textarea id="outputResult" readonly placeholder="ผลลัพธ์จะแสดงตรงนี้ทันทีเมื่อกดปุ่ม..."></textarea>
    <button type="button" class="copy-btn" onclick="copyResult()">📋 คัดลอกผลลัพธ์ทั้งหมด</button>
</div>

<script>
function formatSmmLinks() {
    const logDiv = document.getElementById('statusLog');
    const inputLinks = document.getElementById('inputLinks').value.trim();
    const serviceId = document.getElementById('serviceId').value.trim();
    const defaultViews = document.getElementById('defaultViews').value.trim();
    const outputResult = document.getElementById('outputResult');

    if (!inputLinks) {
        alert('กรุณาวางลิงก์ก่อนกดปุ่มครับ');
        return;
    }

    const links = inputLinks.split('\n').map(l => l.trim()).filter(l => l !== '');
    if (links.length === 0) {
        alert('ไม่พบลิงก์ข้อมูลในช่องรับข้อมูลครับ');
        return;
    }

    logDiv.style.display = 'block';
    logDiv.innerHTML = `⏳ กำลังจัดรูปแบบและวิเคราะห์เกณฑ์จำนวน ${links.length} รายการ...`;

    // ฐานข้อมูลเกณฑ์ยอดวิวจากตารางสถิติเดิมของคุณเพื่อใช้กระจายผลลัพธ์ให้เนียนเป็นธรรมชาติ
    const backupViewRates = ["6000", "8000", "10000", "12000"];[cite: 1]
    let finalFormats = [];

    links.forEach(line => {
        if (line === '') return;

        // ค้นหาลิงก์ URL ในบรรทัด
        const urlRegex = /(https?:\/\/[^\s]+)/;
        const foundUrl = line.match(urlRegex);

        if (foundUrl) {
            let url = foundUrl[0];
            let targetView = defaultViews;

            // 🔥 ตรรกะอัจฉริยะ: ดึง ID ตัวเลขท้ายลิงก์ TikTok มาคำนวณคณิตศาสตร์เพื่อเลือกยอดวิวสลับกันไป
            // วิธีนี้ทำให้ลิงก์เดิมจะได้ยอดวิวเท่าเดิมเสมอ และลิงก์ใหม่ๆ จะถูกสุ่มกระจายค่ายอดวิว 6000-12000 อย่างเป็นธรรมชาติ โดยปุ่มไม่ค้าง
            const urlParts = url.split('/');
            let lastPart = urlParts[urlParts.length - 1].split('?')[0].trim();
            let idNumbers = lastPart.replace(/[^0-9]/g, '');

            if (idNumbers.length > 0) {
                // ใช้เลขท้ายสุดของ ID มาหาเศษเพื่อสลับค่ายอดวิวสถิติของคุณ
                let lastDigit = parseInt(idNumbers.charAt(idNumbers.length - 1));
                let rateIndex = lastDigit % backupViewRates.length;
                targetView = backupViewRates[rateIndex];[cite: 1]
            }

            // จัดเรียงเข้าโครงสร้าง Format SMM
            finalFormats.push(`${serviceId}|${url}|${targetView}`);[cite: 1]
        }
    });

    // ดีดผลลัพธ์ออกช่องล่างทันทีโดยไม่ต้องผ่านเซิร์ฟเวอร์ภายนอก หมดปัญหาปุ่มนิ่งเงียบ
    outputResult.value = finalFormats.join('\n');
    logDiv.innerHTML = `✅ จัดรูปแบบ Format สำเร็จรูปเสร็จเรียบร้อยแล้วทั้งหมด ${finalFormats.length} รายการ!`;
}

function copyResult() {
    const out = document.getElementById('outputResult');
    if (!out || !out.value) {
        alert('ไม่มีข้อมูลในช่องผลลัพธ์ให้คัดลอกครับ');
        return;
    }
    out.select();
    document.execCommand('copy');
    alert('คัดลอกรูปแบบ Format ไปใช้งานเรียบร้อยแล้วครับ!');
}
</script>

</body>
</html>
