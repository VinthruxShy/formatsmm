<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เว็บ format SMM</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; padding: 20px; color: #333; }
        .container { max-width: 950px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 25px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        textarea { height: 160px; font-family: monospace; }
        .btn-group { text-align: center; margin: 20px 0; }
        
        button { 
            background-color: #1a73e8; 
            color: white; 
            border: none; 
            padding: 14px 35px; 
            font-size: 16px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: all 0.1s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover { background-color: #1557b0; }
        button:active { transform: scale(0.96); }
        
        .status-log { background: #e8f0fe; padding: 15px; border-left: 5px solid #1a73e8; margin-bottom: 15px; border-radius: 4px; font-size: 14px; font-weight: bold; color: #1a73e8; }
        button.copy-btn { background-color: #34a853; width: 100%; margin-top: 10px; }
        button.copy-btn:hover { background-color: #2b8c44; }
    </style>
</head>
<body>

<div class="container">
    <h2>เว็บ format SMM</h2>
    
    <div style="display:flex; gap:15px; margin-bottom:15px;">
        <div style="flex:1;">
            <label>💡 เลขบริการด้านหน้า:</label>
            <input type="text" id="serviceId" value="702">
        </div>
        <div style="flex:1;">
            <label>📊 ยอดวิวมาตรฐาน (กรณีฉุกเฉินบรรทัดเกินตาราง):</label>
            <input type="number" id="defaultViews" value="10000">
        </div>
    </div>

    <label>1. วางลิงก์ URL TikTok เพียวๆ เรียงจากล่าสุด (บนสุด) ไปหาเก่าสุด (ล่างสุด):</label>
    <textarea id="inputLinks" placeholder="วางลิงก์ที่ก๊อปปี้มาลงที่นี่..."></textarea>

    <div class="btn-group">
        <button type="button" onclick="formatBySequence()">⚡ เริ่มจัดรูปแบบรูปแบบ Format ในทันที</button>
    </div>

    <div id="statusLog" class="status-log" style="display:none;"></div>

    <label>2. ผลลัพธ์รูปแบบตารางสำเร็จรูป (Format):</label>
    <textarea id="outputResult" readonly placeholder="ผลลัพธ์จะแสดงตรงนี้ทันทีเมื่อกดปุ่ม..."></textarea>
    <button type="button" class="copy-btn" onclick="copyResult()">📋 คัดลอกผลลัพธ์ทั้งหมด</button>
</div>

<script>
// 🔒 ผูกตารางเกณฑ์ยอดวิว 22 คลิปของพี่ เรียงลำดับจากคลิปที่ 01 (เก่าสุด) ไปจนถึงคลิปที่ 22 (ใหม่สุด)
const viewSequenceTable = [
    "6000",  // คลิปที่ 01
    "6000",  // คลิปที่ 02
    "8000",  // คลิปที่ 03
    "8000",  // คลิปที่ 04
    "8000",  // คลิปที่ 05
    "8000",  // คลิปที่ 06
    "8000",  // คลิปที่ 07
    "10000", // คลิปที่ 08
    "10000", // คลิปที่ 09
    "10000", // คลิปที่ 10
    "12000", // คลิปที่ 11
    "12000", // คลิปที่ 12
    "12000", // คลิปที่ 13
    "12000", // คลิปที่ 14
    "8000",  // คลิปที่ 15
    "8000",  // คลิปที่ 16
    "10000", // คลิปที่ 17
    "8000",  // คลิปที่ 18
    "10000", // คลิปที่ 19
    "8000",  // คลิปที่ 20
    "10000", // คลิปที่ 21
    "10000"  // คลิปที่ 22
];

function formatBySequence() {
    const logDiv = document.getElementById('statusLog');
    const inputLinks = document.getElementById('inputLinks').value.trim();
    const serviceId = document.getElementById('serviceId').value.trim();
    const defaultViews = document.getElementById('defaultViews').value.trim();
    const outputResult = document.getElementById('outputResult');

    if (!inputLinks) {
        alert('กรุณาวางลิงก์ก่อนกดปุ่มครับ');
        return;
    }

    // แยกลิงก์ออกเป็นแถว ตัดช่องว่างทิ้ง
    const links = inputLinks.split('\n').map(l => l.trim()).filter(l => l !== '');
    if (links.length === 0) {
        alert('ไม่พบลิงก์ข้อมูลในช่องนำเข้าครับ');
        return;
    }

    logDiv.style.display = 'block';
    logDiv.innerHTML = `⏳ ตรวจพบทั้งหมด ${links.length} รายการ กำลังจัดระเบียบ Format ยอดวิวตามลำดับแถว...`;

    let finalFormats = [];
    
    // ⚡ ตรรกะย้อนศรอัจฉริยะ: 
    // วิ่งอ่านลิงก์จากบนลงล่างตามที่พี่วาง แต่นับดัชนียอดวิวจากล่างขึ้นบน (แถวสุดท้ายของพี่ = คลิปที่ 1 = viewSequenceTable[0])
    for (let i = 0; i < links.length; i++) {
        let url = links[i];
        
        // คำนวณหาลำดับที่แท้จริงจากท้ายลำดับ
        // เช่น ถ้าพี่วางมา 22 ลิงก์ ลิงก์ล่างสุด (i = 21) จะกลายเป็นคลิปลำดับที่ 0 (คลิปที่ 1 ของตาราง = 6000)
        let sequenceIndex = (links.length - 1) - i; 
        
        let targetView = defaultViews;
        
        // ถ้าอยู่ในช่วง 22 คลิป ให้ดึงยอดวิวตามลำดับตารางมาเสียบทันที ไม่ต้องง้อ API
        if (sequenceIndex >= 0 && sequenceIndex < viewSequenceTable.length) {
            targetView = viewSequenceTable[sequenceIndex];
        }

        // จัดชิ้นส่วนเข้าคู่ Format
        finalFormats.push(`${serviceId}|${url}|${targetView}`);
    }

    // พ่นข้อความ Format ออกหน้าจอทันทีใน 0.001 วินาที!
    outputResult.value = finalFormats.join('\n');
    logDiv.innerHTML = `✅ ประมวลผลเสร็จสิ้น! จัดรูปแบบ Format ตรงตามลำดับคลิปของพี่ครบถ้วน ${finalFormats.length} รายการแล้วครับ`;
}

function copyResult() {
    const out = document.getElementById('outputResult');
    if (!out || !out.value) {
        alert('ไม่มีข้อมูลในช่องผลลัพธ์ให้คัดลอกครับ');
        return;
    }
    out.select();
    document.execCommand('copy');
    alert('คัดลอกรูปแบบ Format เรียบร้อยแล้วครับ!');
}
</script>

</body>
</html>
