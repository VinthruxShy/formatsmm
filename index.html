<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เครื่องมือแปลงรูปแบบข้อมูล (Format Converter v6.0)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #1a73e8;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .row {
            display: flex;
            gap: 15px;
        }
        .col {
            flex: 1;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        textarea {
            width: 100%;
            height: 180px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            resize: vertical;
            font-family: monospace;
            font-size: 14px;
        }
        .btn-group {
            margin: 20px 0;
            text-align: center;
        }
        button {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #1557b0;
        }
        button.copy-btn {
            background-color: #34a853;
            margin-top: 10px;
            width: 100%;
        }
        button.copy-btn:hover {
            background-color: #2b8c44;
        }
        .note {
            font-size: 13px;
            color: #1a73e8;
            font-weight: bold;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>เครื่องมือแปลงรูปแบบข้อมูล + ระบบแกะลิงก์เพียวๆ อัจฉริยะ (v6.0)</h2>
    
    <div class="row">
        <div class="form-group col">
            <label for="customServiceId">💡 เลขบริการด้านหน้า:</label>
            <input type="text" id="customServiceId" value="702" placeholder="เช่น 702">
        </div>
        <div class="form-group col">
            <label for="defaultViews">📊 ยอดวิวเริ่มต้น (หากไม่พบประวัติลิงก์นี้):</label>
            <input type="number" id="defaultViews" value="10000" placeholder="เช่น 10000">
        </div>
    </div>

    <div class="form-group">
        <label for="inputData">1. วางลิงก์ URL TikTok เพียวๆ ตรงนี้:</label>
        <textarea id="inputData" placeholder="วางลิงก์เพียวๆ ยาวๆ ลงมาได้เลยครับ ระบบจะเช็กไอดีท้ายลิงก์กับฐานข้อมูลให้เอง..."></textarea>
        <div class="note">✨ เปิดใช้งานระบบจำพฤติกรรมลิงก์จากฐานข้อมูลตาราง SMM เรียบร้อยแล้ว!</div>
    </div>
    
    <div class="btn-group">
        <button onclick="convertData()">⚡ แปลงข้อมูลจากลิงก์เพียวๆ</button>
    </div>
    
    <div class="form-group">
        <label for="outputData">2. ผลลัพธ์รูปแบบที่ต้องการ (Format):</label>
        <textarea id="outputData" readonly placeholder="ผลลัพธ์จะแสดงที่นี่..."></textarea>
        <button class="copy-btn" onclick="copyToClipboard()">📋 คัดลอกผลลัพธ์ทั้งหมด</button>
    </div>
</div>

<script>
// ฐานข้อมูลที่ผูก ID ท้ายลิงก์จริงเข้ากับจำนวนวิวจากตาราง format smm ของคุณ
const urlDatabase = [
    { id: "7642936997614570759", view: "10000" },
    { id: "7642936968157859079", view: "10000" },
    { id: "7642936932149759240", view: "8000" },
    { id: "7642936907759914247", view: "10000" },
    { id: "7642936876998954247", view: "8000" },
    { id: "7642936835102067975", view: "10000" },
    { id: "7642936809306983688", view: "8000" },
    { id: "7642935948275223816", view: "12000" },
    { id: "7642935910598118664", view: "12000" },
    { id: "7642935888317779208", view: "12000" },
    { id: "7642935828611730706", view: "12000" },
    { id: "7642935810420919559", view: "10000" },
    { id: "7642935773003599122", view: "10000" },
    { id: "7642935749003775240", view: "10000" },
    { id: "7642935710395239687", view: "8000" },
    { id: "7642935671035825426", view: "8000" },
    { id: "7642935635774295314", view: "8000" },
    { id: "7642935601192291592", view: "8000" },
    { id: "7642935567071595794", view: "8000" },
    { id: "7642935512898063624", view: "6000" },
    { id: "7642935473500900616", view: "6000" }
];

function convertData() {
    const input = document.getElementById('inputData').value;
    const customServiceId = document.getElementById('customServiceId').value.trim();
    const defaultViews = document.getElementById('defaultViews').value.trim() || '10000';
    
    if (!input.trim()) {
        alert('กรุณาวางลิงก์ข้อมูลก่อนครับ');
        return;
    }

    const lines = input.split('\n');
    let result = [];

    lines.forEach(line => {
        if (line.trim() === '') return;

        let serviceId = customServiceId || '702';
        let url = '';
        let views = '';

        // ดึงเฉพาะตัวลิงก์ URL ออกมาจากบรรทัดนั้นๆ
        const urlRegex = /(https?:\/\/[^\s]+)/;
        const foundUrl = line.match(urlRegex);
        
        if (foundUrl) {
            url = foundUrl[0];
            
            // 🔥 วิธีการสแกนหาตัวเลข ID หลังเครื่องหมายสแลช (/) ตัวสุดท้ายของลิงก์
            // เช่น ดึง "7642935473500900616" ออกมาจากลิงก์เพื่อเอาไปเทียบวิว
            const urlParts = url.split('/');
            let lastPart = urlParts[urlParts.length - 1].split('?')[0].trim(); // ตัดส่วนพารามิเตอร์ ? ออกถ้ามี

            // นำ ID ที่แกะได้ไปค้นหาในฐานข้อมูล
            let matchDatabase = urlDatabase.find(item => item.id === lastPart);
            
            if (matchDatabase) {
                views = matchDatabase.view; // ถ้าตรงคู่ในตาราง จะดึงค่ายอดวิวที่แท้จริงมาใส่ให้ทันที
            } else {
                views = defaultViews; // ถ้าเป็นลิงก์ใหม่ๆ ที่ไม่อยู่ในตาราง 21 ตัวนี้ จะใช้ค่าเริ่มต้นด้านบนแทนครับ
            }
        }

        if (url) {
            result.push(`${serviceId}|${url}|${views}`);
        }
    });

    if (result.length === 0) {
        alert('ไม่พบลิงก์ URL ในช่องรับข้อมูลครับ');
        return;
    }

    document.getElementById('outputData').value = result.join('\n');
}

function copyToClipboard() {
    const outputText = document.getElementById('outputData');
    if (!outputText.value) {
        alert('ไม่มีข้อมูลให้คัดลอกครับ');
        return;
    }
    outputText.select();
    outputText.setSelectionRange(0, 99999);
    document.execCommand("copy");
    alert("คัดลอกรูปแบบ Format ไปใช้งานเรียบร้อยแล้ว!");
}
</script>

</body>
</html>
